server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 118.196.101.57 _;

    client_max_body_size 1g;

    root /var/www/xbeaconai-web;
    index index.html;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8787/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.xbeaconai.com api.xbeaconai.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name app.xbeaconai.com;

    ssl_certificate /etc/letsencrypt/live/app.xbeaconai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.xbeaconai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/xbeaconai-web;
    index index.html;

    location ^~ /api/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.xbeaconai.com;

    ssl_certificate /etc/letsencrypt/live/app.xbeaconai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.xbeaconai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 1g;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8787/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
